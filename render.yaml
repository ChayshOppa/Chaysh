services:
  - type: web
    name: chaysh
    env: python
    buildCommand: |
      chmod +x build.sh
      ./build.sh
    startCommand: gunicorn src.main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: MODEL_NAME
        value: gpt-4-mini
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /
    autoDeploy: true 