services:
  - type: web
    name: chaysh
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn src.main:app -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OPENROUTER_API_KEY
        sync: false 