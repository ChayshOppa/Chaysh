<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaysh Assistant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 30px;
            background: #f9f9f9;
        }
        .chat-container {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 30px;
            margin-top: 40px;
        }
        .chat-title {
            font-size: 22px;
            color: #4CAF50;
            margin-bottom: 10px;
        }
        .chat-placeholder {
            color: #888;
            margin-top: 30px;
            font-size: 16px;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #1a0dab;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-title">Chaysh Assistant</div>
        <div><strong>Product:</strong> {{ query }}</div>
        <div class="chat-placeholder">
            <p>This is a placeholder for the AI chat assistant.</p>
            <p>In the future, you will be able to ask questions about this product and get AI-generated answers here.</p>
        </div>
        <a href="javascript:history.back()" class="back-link">&larr; Back to results</a>
    </div>
</body>
</html>
